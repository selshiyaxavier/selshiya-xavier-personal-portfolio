name: Update Portfolio Data

on:
  push:
    paths:
      - 'data/portfolio_links.txt'  # Trigger only when links file changes
  workflow_dispatch:  # Manual trigger option

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Give permission to push changes

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install instaloader

    - name: Run update script
      run: python scripts/update_portfolio.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/portfolio.json public/images/portfolio/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update portfolio data [skip ci]" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
